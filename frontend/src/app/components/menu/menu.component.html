<section class="menu section" id="menu">
  <div class="container">
    <div class="section-header">
      <h2>Our Menu</h2>
      <div class="decorative-divider"><span></span><i>☕</i><span></span></div>
      <p>Crafted with passion, served with love. Explore our curated selection of coffees, bites, and sweet indulgences.</p>
    </div>

    <div class="menu-filters">
      <button *ngFor="let cat of categories"
              class="menu-filter-btn"
              [class.active]="activeFilter === cat"
              (click)="setFilter(cat)">
        {{ cat }}
      </button>
    </div>

    <div class="menu-grid">
      <div class="menu-card" *ngFor="let item of filteredItems; let i = index">
        <div class="menu-card-icon">{{ item.emoji }}</div>
        <div class="menu-card-info">
          <div class="menu-item-header">
            <h4>{{ item.name }}</h4>
            <span class="price">{{ item.price }}</span>
          </div>
          <p>{{ item.desc }}</p>
          <span class="menu-tag">{{ item.category }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
